<!DOCTYPE html>
<html>
<head>

<title>Ram & Yuktha Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#0a1b3d;
color:white;
text-align:center;
overflow-x:hidden;
}

/* HEADER */

.header{
padding:80px 20px;
}

.names{
font-family:'Cinzel',serif;
font-size:60px;
color:#FFD700;
}

.subtitle{
font-size:24px;
margin-top:10px;
}

.date{
color:#ccc;
}

/* PROPOSAL CARTOON */

.couple{
width:260px;
margin-top:30px;
filter:drop-shadow(0 10px 15px rgba(0,0,0,0.6));
}

/* SECTIONS */

.section{
padding:70px 20px;
max-width:1000px;
margin:auto;
}

/* PHOTOS */

.gallery{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
margin-top:30px;
}

.gallery img{
width:340px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transition:transform .4s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* COUNTDOWN */

.countdown{
font-size:38px;
color:#FFD700;
margin-top:20px;
}

/* EVENT CARD */

.card{
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.6);
max-width:400px;
margin:auto;
}

button{
padding:15px 35px;
font-size:16px;
background:#FFD700;
color:#0a1b3d;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#e6c200;
}

.footer{
padding:40px;
color:#ccc;
}

/* HEART ANIMATION */

.heart{
position:fixed;
bottom:-10px;
font-size:20px;
animation:float 6s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:0.8;
}
100%{
transform:translateY(-110vh);
opacity:0;
}
}

</style>

</head>

<body>

<div class="header">

<div class="names">Ram ❤️ Yuktha</div>

<div class="subtitle">We're Getting Engaged</div>

<div class="date">April 12, 2026 • 6:00 PM</div>

<!-- Proper proposal cartoon -->
<img class="couple" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png">

</div>

<div class="section">

<h2>Our Photos</h2>

<div class="gallery">

<img src="photo1.jpeg">
<img src="photo2.jpeg">

</div>

</div>

<div class="section">

<h2>Countdown to Our Special Day</h2>

<div id="countdown" class="countdown"></div>

</div>

<div class="section">

<h2>Event Details</h2>

<div class="card">

<p><b>Date:</b> April 12, 2026</p>

<p><b>Time:</b> 6:00 PM onwards</p>

<p><b>Venue:</b> Hotel Sindhu Towers</p>

<a href="https://maps.app.goo.gl/Dyys4CopRbk1stgD9" target="_blank">
<button>Open Location</button>
</a>

</div>

</div>

<div class="footer">
We look forward to celebrating this beautiful moment with you 💍
</div>

<script>

/* COUNTDOWN */

var countDownDate = new Date("Apr 12, 2026 18:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();
var distance = countDownDate - now;

var days = Math.floor(distance/(1000*60*60*24));
var hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((distance%(1000*60*60))/(1000*60));
var seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
days+" Days "+hours+" Hours "+minutes+" Minutes "+seconds+" Seconds";

},1000);


/* FLOATING HEARTS */

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*20)+"px";
heart.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000)

}

setInterval(createHeart,400);

</script>

</body>
</html>
